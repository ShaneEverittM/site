<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
  {% block extra_head %}{% endblock extra_head %}
</head>
<body>

  <nav class="site-nav">
    <div class="inner">
      <a class="site-logo" href="{{ get_url(path='/') }}">{{ config.title }}</a>
      <div class="nav-links">
        <a href="{{ get_url(path='/work') }}">Work</a>
        <a href="{{ get_url(path='/writing') }}">Writing</a>
        <a href="{{ get_url(path='/fitness') }}">Fitness</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <div class="inner">
      <span class="footer-name">{{ config.title }}</span>
      <div class="footer-links">
        {% if config.extra.github %}
          <a href="{{ config.extra.github }}">GitHub</a>
        {% endif %}
        {% if config.extra.linkedin %}
          <a href="{{ config.extra.linkedin }}">LinkedIn</a>
        {% endif %}
        {% if config.extra.email %}
          <a href="mailto:{{ config.extra.email }}">Email</a>
        {% endif %}
      </div>
    </div>
  </footer>

</body>
</html>
