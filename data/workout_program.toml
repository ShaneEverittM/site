[meta]
tag = "5-Day Program · Recomposition Focus"
title = "Strength & Recomp Program"
description = """
Heavy 3×5 compounds on Monday, hypertrophy variations on Wednesday, \
and a pull-focused session on Friday — with kettlebell functional work and \
conditioning filling the gaps.\
"""


# ─────────────────────────────────────────────────────────────────────
# Science notes (referenced by `science_keys` on each day)
# ─────────────────────────────────────────────────────────────────────

[science_notes.volume]
title = "Weekly Volume & Hypertrophy"
body = """
Schoenfeld, Ogborn & Krieger (2017) conducted a meta-analysis of 15 studies \
and found a significant dose-response relationship between weekly training \
volume (measured in sets per muscle group) and muscle growth (p = 0.002). \
The practical takeaway: ~10–20 sets per muscle group per week appears \
optimal for hypertrophy. This program targets 12–16 weekly sets for major \
muscle groups by distributing volume across heavy, hypertrophy, and \
functional days.\
"""
source = "Schoenfeld BJ, Ogborn D, Krieger JW. J Sports Sci. 2017;35(11):1073-1082."

[science_notes.frequency]
title = "Training Frequency"
body = """
A 2016 meta-analysis by Schoenfeld et al. found that training each muscle \
group at least twice per week produced superior hypertrophy compared to \
once per week when total volume was equated. However, a 2019 systematic \
review by the same group found that once volume is matched, frequency \
itself has diminishing returns — meaning you can distribute your sets \
across 2, 3, or even 5 sessions and get similar results, as long as total \
weekly volume is adequate. This gives you freedom to structure your week \
around recovery and lifestyle.\
"""
source = "Schoenfeld BJ, Ogborn D, Krieger JW. Sports Med. 2016;46(11):1689-1697."

[science_notes.linearProgression]
title = "Linear Progression & Heavy Compound Training"
body = """
No peer-reviewed RCT has specifically validated the 5×5 or 3×5 protocol \
as a complete program — the evidence supporting them is entirely indirect, \
drawn from research on progressive overload, multiple-set superiority, \
and compound movements. Kraemer & Ratamess (2004) found that neural \
adaptations dominate early training responses, meaning beginners get \
stronger primarily through improved motor unit recruitment. The ACSM \
Position Stand (2009) actually recommends 8–12 RM for novices, which \
differs from the 3–5 rep range. However, novices respond broadly to any \
progressive program. The true advantages of low-rep barbell training are \
simplicity, adequate heavy practice, and decades of coaching refinement. \
Pelland et al. (2026) found strength gains plateau at surprisingly low \
volume (~3 fractional weekly sets) with adequate frequency — which is \
why this program uses 3×5 rather than 5×5, reserving recovery capacity \
for hypertrophy work.\
"""
source = "Kraemer WJ, Ratamess NA. Med Sci Sports Exerc. 2004. ACSM Position Stand. Med Sci Sports Exerc. 2009. Pelland JC et al. Sports Med. 2026;56(2):481-505."

[science_notes.recomp]
title = "Body Recomposition"
body = """
A 2020 review in Strength & Conditioning Journal (Barakat et al.) \
demonstrated that body recomposition — simultaneous fat loss and muscle \
gain — is well-documented even in trained populations, not just novices. \
The two critical factors are progressive resistance training and high \
protein intake. A meta-analysis of fat loss studies found that muscle \
growth stalls when caloric deficits exceed ~500 calories, suggesting a \
mild deficit of 200–300 calories (or eating at maintenance) is optimal \
for recomp. Novice and detrained lifters have the greatest recomp \
potential.\
"""
source = "Barakat C et al. Strength Cond J. 2020;42(5):7-21."

[science_notes.protein]
title = "Protein for Recomposition"
body = """
Research in the Journal of the International Society of Sports Nutrition \
indicates that protein intakes of 1.6–2.2g per kg of bodyweight maximize \
muscle protein synthesis when combined with resistance training. During a \
caloric deficit, higher protein (up to 2.4g/kg/day) has been shown to \
preserve lean mass and promote fat loss more effectively than lower \
intakes. For a 175lb (79.5kg) individual, this translates to roughly \
127–175g of protein per day. Studies pooled by The Muscle PhD found that \
the average protein intake across successful recomp studies was \
2.56g/kg/day (~1.16g/lb/day).\
"""
source = "Jäger R et al. JISSN. 2017;14:20. Longland TM et al. Am J Clin Nutr. 2016;103(3):738-746."

[science_notes.unilateral]
title = "Unilateral Training & Kettlebells"
body = """
Unilateral (single-limb) training addresses strength asymmetries that \
bilateral movements can mask. Research on cross-education shows that \
training one limb can even preserve strength in an immobilized \
contralateral limb (Magnus et al., 2018). Kettlebells are particularly \
suited for unilateral work because their offset center of mass forces \
greater stabilizer recruitment. A 2024 study in Frontiers in Sports found \
that two-armed kettlebell swings produced bilateral asymmetries exceeding \
15% in the posterior deltoid and external oblique — suggesting single-arm \
variations may be needed to address these imbalances.\
"""
source = "Magnus CRA et al. J Appl Physiol. 2018. Frontiers in Sports and Active Living. 2024."

[science_notes.trapImbalance]
title = "Trap Asymmetry & Corrective Approach"
body = """
Prolonged asymmetric postures — such as mouse use in gaming or desk work \
— can create chronic hypertonicity in the dominant-side upper trapezius \
via the Cinderella hypothesis (Hägg, 1991): the same low-threshold motor \
units are continuously recruited and never allowed to rest. The muscle \
isn't necessarily larger; it's neurally 'stuck on.' Research by Sjøgaard \
et al. (2006) confirmed sustained trapezius activity above resting levels \
during computer work. Importantly, rehabilitation researchers caution \
against excessive upper trap strengthening when the real issue is an \
upper/lower trapezius imbalance. For desk workers, training the lower \
trapezius and serratus anterior — the muscles that are actually weak — \
is often more appropriate than piling more shrugs onto an already \
overactive upper trap. Progressive resistance training of any kind \
significantly reduces trapezius pain (Andersen et al., 2008; 2011).\
"""
source = "Sjøgaard G et al. Eur J Appl Physiol. 2006. Visser B, van Dieën JH. Clin Biomech. 2006. Andersen LL et al. Arthritis Care Res. 2008."

[science_notes.posterior]
title = "Posterior Chain & Pulling Volume"
body = """
The often-cited 2:1 pull-to-push ratio is coaching heuristic, not \
research-validated — no peer-reviewed study has tested whether specific \
ratios produce superior outcomes for posture or shoulder health. However, \
the premise is sound: Negrete et al. (2013) found recreationally active \
males are naturally push-dominant at 1.57:1, and Kolber et al. (2009) \
showed weight trainers develop measurable anterior-biased imbalances. \
The practical takeaway: ensure adequate pulling volume rather than chasing \
a specific ratio. Warneke et al. (2024) found that strengthening exercises \
produced large improvements in thoracic and cervical posture, while \
stretching alone had no effect.\
"""
source = "Negrete et al. Int J Sports Phys Ther. 2013. Kolber et al. JSCR. 2009. Warneke et al. Sports Med Open. 2024."


# ─────────────────────────────────────────────────────────────────────
# Training days
# ─────────────────────────────────────────────────────────────────────

[[days]]
id = "monday"
name = "Monday"
title = "Heavy Compound Strength"
subtitle = "3×5 Linear Progression"
science_keys = ["linearProgression", "volume"]
rationale = """
This is your primary strength day. The 3×5 protocol at ~80-85% 1RM \
develops maximal strength through neural adaptation with minimal \
unnecessary fatigue. Pelland et al. (2026) found strength gains plateau \
at remarkably low volume (~3 fractional weekly sets) when frequency is \
adequate — so 3 heavy sets here, combined with Wednesday's lighter \
exposure, gives you near-optimal strength stimulus without burning \
recovery you need for hypertrophy work. Add 5lbs to squat and deadlift \
every session, and 5lbs to bench/OHP every week. Linear progression on a \
3×5 protocol — focused working sets without excess fatigue.\
"""

[[days.exercises]]
id = "barbell_squat"
name = "Barbell Back Squat"
sets = "3×5"
sets_n = 3
volume = ["quads"]
progression = { kind = "linear", increment_lbs = 5, cadence = "session" }
notes = "Work weight. Add 5lbs per session. Full depth (hip crease below knee). 2-3 min rest between sets."
primary = true

[[days.exercises]]
id = "barbell_bench"
name = "Barbell Bench Press"
sets = "3×5"
sets_n = 3
volume = ["chest"]
progression = { kind = "linear", increment_lbs = 5, cadence = "session" }
notes = "Work weight. Add 5lbs per week. Full ROM, pause briefly on chest. 2-3 min rest."
primary = true

[[days.exercises]]
id = "barbell_ohp"
name = "Barbell Overhead Press"
sets = "3×5"
sets_n = 3
volume = ["front_delts"]
progression = { kind = "linear", increment_lbs = 2.5, cadence = "session" }
notes = "Work weight. Add 2.5-5lbs per week. Strict press, no leg drive. 2-3 min rest."
primary = true

[[days.exercises]]
id = "barbell_row_pendlay"
name = "Barbell Row (Pendlay)"
sets = "3×8"
sets_n = 3
volume = ["back"]
progression = { kind = "linear", increment_lbs = 5, cadence = "session" }
notes = "From floor each rep. Adds horizontal pulling volume to balance the bench and OHP work."
primary = false

[[days.exercises]]
id = "face_pulls"
name = "Face Pulls (Tonal or band)"
sets = "3×15"
sets_n = 3
volume = ["rear_delts"]
notes = "Light weight, high reps. External rotation at top. Rear delt & rotator cuff health."
primary = false


[[days]]
id = "tuesday"
name = "Tuesday"
title = "Kettlebell Functional"
subtitle = "Unilateral & Cross-Body Patterns"
science_keys = ["unilateral"]
rationale = """
This session prioritizes single-limb and asymmetrical loading patterns \
that expose and correct imbalances. The offset center of mass in a \
kettlebell forces greater core and stabilizer engagement than dumbbells. \
Always start with your weaker side and match reps — never do more on \
your strong side.\
"""

[[days.exercises]]
id = "kb_turkish_getup"
name = "Turkish Get-Up"
sets = "3×2 per side"
sets_n = 3
volume = ["core"]
notes = "Slow and controlled. This is a full-body mobility and stability drill disguised as strength work. Use a weight you can control perfectly."
primary = true

[[days.exercises]]
id = "kb_swing_single_arm"
name = "Single-Arm KB Swing"
sets = "5×10 per side"
sets_n = 5
volume = ["posterior_chain"]
notes = "Hip hinge, not squat. Explosive hip extension. Anti-rotation demand is high."
primary = true

[[days.exercises]]
id = "kb_clean_press_single_arm"
name = "Single-Arm KB Clean & Press"
sets = "4×5 per side"
sets_n = 4
volume = ["front_delts"]
notes = "Rack clean, then strict press. Builds unilateral pressing strength and shoulder stability."
primary = true

[[days.exercises]]
id = "kb_sl_rdl"
name = "KB Single-Leg Romanian Deadlift"
sets = "3×8 per side"
sets_n = 3
volume = ["posterior_chain"]
notes = "Hold KB in opposite hand (contralateral). Develops posterior chain and balance simultaneously."
primary = false

[[days.exercises]]
id = "kb_windmill"
name = "KB Windmill"
sets = "3×5 per side"
sets_n = 3
volume = ["core"]
notes = "Thoracic rotation under load. Directly addresses the posture and mobility goals you described."
primary = false

[[days.exercises]]
id = "kb_lateral_lunge"
name = "KB Goblet Lateral Lunge"
sets = "3×8 per side"
sets_n = 3
volume = ["quads", "posterior_chain"]
notes = "Frontal plane movement — a pattern the barbell lifts don't train."
primary = false


[[days]]
id = "wednesday"
name = "Wednesday"
title = "Hypertrophy Compounds"
subtitle = "Lighter Variations · 3×8-12"
science_keys = ["frequency", "volume"]
rationale = """
This is Monday's complement — same movement patterns (squat, press, push), \
lighter loads, higher reps. You're not trying to set PRs here; you're \
accumulating volume at hypertrophy rep ranges to drive muscle growth and \
practice the movement patterns a second time per week. Using dumbbell and \
variation lifts instead of repeating the exact barbell movements reduces \
joint stress while still training the same muscles. Research consistently \
shows that hitting each muscle group twice weekly is superior for both \
strength and hypertrophy when volume is equated.\
"""

[[days.exercises]]
id = "front_squat"
name = "Front Squat or Goblet Squat (heavy DB)"
sets = "3×10"
sets_n = 3
volume = ["quads"]
notes = "Different squat pattern from Monday — front-loaded forces more upright torso and targets quads harder. Also builds the upper back bracing you need for heavier back squats."
primary = true

[[days.exercises]]
id = "db_bench"
name = "Dumbbell Bench Press"
sets = "3×10"
sets_n = 3
volume = ["chest"]
notes = "Greater ROM than barbell and forces each arm to stabilize independently. Addresses any left/right pressing imbalance. Moderate weight, controlled tempo."
primary = true

[[days.exercises]]
id = "db_ohp"
name = "Dumbbell Overhead Press (seated)"
sets = "3×10"
sets_n = 3
volume = ["front_delts"]
notes = "Seated removes leg drive entirely — pure shoulder strength. Lighter than barbell OHP but second weekly pressing exposure builds the volume needed for shoulder growth."
primary = true

[[days.exercises]]
id = "incline_db_press"
name = "Incline DB Press"
sets = "3×10"
sets_n = 3
volume = ["chest"]
notes = "Targets upper chest and front delts, which are harder to hit with flat pressing. 30-45° incline. Adds pressing volume without repeating Monday's exact stimulus."
primary = false

[[days.exercises]]
id = "prone_y_raises"
name = "Prone Y-Raises (DB or bench)"
sets = "3×12"
sets_n = 3
volume = ["rear_delts"]
notes = "POSTURE CORRECTION: Lie face-down on an incline bench, arms hanging. Raise DBs into a Y overhead, thumbs up. Targets the lower trapezius and serratus anterior — the muscles that are actually weak in desk workers, unlike the overactive upper traps."
primary = false

[[days.exercises]]
id = "tricep_pushdown"
name = "Tricep Pushdown (Tonal)"
sets = "3×12"
sets_n = 3
volume = ["triceps"]
notes = "Isolation work for triceps — the limiting muscle on both bench and OHP. The Tonal's cable is ideal for constant tension through the full range."
primary = false

[[days.exercises]]
id = "lateral_raises_db"
name = "Lateral Raises (DB)"
sets = "3×15"
sets_n = 3
volume = ["side_delts"]
notes = "Builds the medial delt cap that makes shoulders look broader. Light weight, controlled, no momentum. This is one of the few isolation moves worth programming for aesthetics."
primary = false


[[days]]
id = "thursday"
name = "Thursday"
title = "Conditioning + Mobility"
subtitle = "Work Capacity & Posture Correction"
science_keys = ["recomp", "trapImbalance"]
rationale = """
Placed mid-late week as a deliberate intensity valley between Wednesday's \
hypertrophy work and Friday's heavy pulling. KB complexes build work \
capacity (which supports recomp by increasing energy expenditure without \
the cortisol spike of long cardio), while the mobility work targets the \
specific postural issues visible in your side-profile photo. The trap \
release and neck stretch work addresses your dominant-side hypertonicity \
from mouse use — do this consistently and you should feel a difference \
within 2-3 weeks.\
"""

[[days.exercises]]
id = "kb_complex"
name = "KB Complex: Swing → Clean → Press → Squat"
sets = "4 rounds × 5 reps per movement, each arm"
sets_n = 0
volume = []
notes = "Use a moderate KB. Run all 4 movements on one arm, switch, repeat — that's one round. No rest between movements within a round, 90sec rest between rounds. This is your cardio."
primary = true

[[days.exercises]]
id = "farmers_carry"
name = "Farmer's Carries (heavy DBs)"
sets = "4 × 40m (2 two-handed, 2 single-arm per side)"
sets_n = 0
volume = []
notes = "Grip, traps, core, everything. Walk tall. Two rounds two-handed, then two rounds single-arm — one carry per side — to expose and correct the trap imbalance. The weaker side will fatigue first."
primary = true

[[days.exercises]]
id = "assisted_pullups"
name = "X-Bar Assisted Pullups or Lat Pulldown (Tonal)"
sets = "3 × AMRAP (1-2 reps shy of failure)"
sets_n = 3
volume = ["back"]
notes = "Vertical pulling — essential for lat development and shoulder health. Stop each set 1-2 reps before form breakdown, not at absolute failure. Use the Tonal for assisted pulldowns until you can do 3+ unassisted reps on the X-bar. No shame in assistance — building the pattern matters more than the method."
primary = true

[[days.exercises]]
id = "band_pull_aparts"
name = "Band Pull-Aparts"
sets = "3×20"
sets_n = 3
volume = ["rear_delts"]
notes = "Posture corrective. Retracts scapulae and strengthens mid/lower traps."
primary = false

[[days.exercises]]
id = "upper_trap_release"
name = "Upper Trap Release (lacrosse ball)"
sets = "60-90 sec per side"
sets_n = 0
volume = []
notes = "TRAP CORRECTION: Pin lacrosse ball between dominant-side upper trap and wall. Apply pressure and slowly nod/turn head. Releases the chronic hypertonicity from mouse-arm posture."
primary = false

[[days.exercises]]
id = "neck_stretches_lateral"
name = "Lateral Neck Stretches"
sets = "30 sec × 3 per side"
sets_n = 0
volume = []
notes = "TRAP CORRECTION: Ear toward shoulder, gentle hand pressure. Focus extra time on the tight (dominant) side. Pairs with the lacrosse ball work to restore resting symmetry."
primary = false

[[days.exercises]]
id = "t_spine_extensions"
name = "Thoracic Spine Extensions (foam roller)"
sets = "2×10"
sets_n = 0
volume = []
notes = "Lie on foam roller at upper back, hands behind head, extend over it. Directly counters desk-posture rounding."
primary = false

[[days.exercises]]
id = "hip_stretch_90_90"
name = "90/90 Hip Stretch"
sets = "2 min per side"
sets_n = 0
volume = []
notes = "Internal and external hip rotation. Essential for squat depth and hip health."
primary = false

[[days.exercises]]
id = "wall_slides"
name = "Wall Slides"
sets = "3×10"
sets_n = 0
volume = []
notes = "Back and arms against wall, slide up into Y position. Tests and builds overhead mobility for your OHP."
primary = false


[[days]]
id = "friday"
name = "Friday"
title = "Pull & Posterior Chain Focus"
subtitle = "Hypertrophy Rep Ranges (3×8-12)"
science_keys = ["posterior", "volume", "trapImbalance"]
rationale = """
Friday placement gives you the full weekend to recover from deadlifts \
before Monday's heavy squats. This day directly addresses the \
anterior/posterior imbalance visible in your photos and the trap \
asymmetry from dominant-side mouse use. Pulling movements are programmed \
at hypertrophy rep ranges (8-12) to build muscle mass in your upper back, \
lats, and rear delts. Assisted pullups add the vertical pull volume that \
brings weekly back sets to ~19.\
"""

[[days.exercises]]
id = "barbell_deadlift"
name = "Barbell Deadlift"
sets = "3×5"
sets_n = 3
volume = ["posterior_chain", "back"]
progression = { kind = "linear", increment_lbs = 5, cadence = "session" }
notes = "Work weight but NOT max effort. Add 5lbs per session. Landing on Friday means 2 full rest days before Monday's squats — optimal spacing."
primary = true

[[days.exercises]]
id = "assisted_pullups"
name = "Assisted Pullups (band or Tonal) or Lat Pulldown"
sets = "3×8"
sets_n = 3
volume = ["back"]
notes = "VERTICAL PULL: Second weekly exposure for adequate lat volume. Use a band looped over the X-bar for assistance, or the Tonal's lat pulldown. Progress toward unassisted reps over time."
primary = true

[[days.exercises]]
id = "db_row"
name = "Dumbbell Row"
sets = "4×10 per side"
sets_n = 4
volume = ["back"]
notes = "Unilateral. Full stretch at bottom, squeeze shoulder blade at top. Builds lat thickness and addresses left/right pulling imbalances."
primary = true

[[days.exercises]]
id = "dips"
name = "Dips (bodyweight → weighted)"
sets = "3×8-12"
sets_n = 3
volume = ["chest"]
notes = "Use the dip station. Full ROM. Once you can do 3×12 easily, add weight via a belt or holding a DB between your feet."
primary = true

[[days.exercises]]
id = "db_shrug_single_arm"
name = "Single-Arm DB Shrug"
sets = "2×12 per side"
sets_n = 2
volume = []
notes = "TRAP CORRECTION: Light weight, activation-focused. Start with weaker (non-mouse) side. 2-second hold at top. This is the only shrug session per week — the goal is balanced recruitment, not building more upper trap mass on an already overactive muscle."
primary = false

[[days.exercises]]
id = "face_pulls"
name = "Face Pulls"
sets = "3×15"
sets_n = 3
volume = ["rear_delts"]
notes = "Twice per week is appropriate for correcting anterior dominance. Light, controlled."
primary = false

[[days.exercises]]
id = "hammer_curls"
name = "Hammer Curls (DB)"
sets = "3×10"
sets_n = 3
volume = ["biceps"]
notes = "Builds brachioradialis and bicep. Neutral grip is easier on the elbows than barbell curls."
primary = false

[[days.exercises]]
id = "pallof_press"
name = "Pallof Press (Tonal)"
sets = "3×10 per side"
sets_n = 3
volume = ["core"]
notes = "Anti-rotation core work. Far more functional than crunches. The Tonal's cable system is perfect for this."
primary = false

[[days.exercises]]
id = "dead_bugs"
name = "Dead Bugs"
sets = "3×8 per side"
sets_n = 3
volume = ["core"]
notes = "Core stability under contralateral limb movement. Directly trains the deep stabilizers."
primary = false


[[days]]
id = "weekend"
name = "Saturday & Sunday"
title = "Full Rest"
subtitle = "Recovery & Nutrition Focus"
science_keys = ["protein"]
rationale = """
After five consecutive training days, two full rest days are essential \
for CNS and muscular recovery. You've accumulated significant volume \
across the week — your body builds muscle during rest, not during \
training. Use this time to meal prep and ensure you're hitting protein \
targets. Sleep quality on rest days is just as important as training \
days for adaptation.\
"""
exercises = []


# ─────────────────────────────────────────────────────────────────────
# Progression
# ─────────────────────────────────────────────────────────────────────

[progression]
title = "12-Week Progression Framework"

[[progression.phases]]
name = "Weeks 1–4: Foundation"
description = "Focus on nailing form and building consistency. Start the 3×5 lifts at current working weight (135lbs) and progress linearly. KB days should use a weight you can control perfectly for every rep. Track every session."
targets = [
    "Bench: 135 → 155 lbs",
    "Squat: 135 → 175 lbs",
    "Deadlift: 135 → 195 lbs",
]

[[progression.phases]]
name = "Weeks 5–8: Push"
description = "Linear progression should still be working. If you stall on a lift (fail to complete 3×5), repeat the same weight next session. Two consecutive failures = deload 10% and build back up. Add cardio intensity on Thursday (shorter rest between KB complex rounds)."
targets = [
    "Bench: 155 → 175 lbs",
    "Squat: 175 → 215 lbs",
    "Deadlift: 195 → 255 lbs",
]

[[progression.phases]]
name = "Weeks 9–12: Transition"
description = "If linear progression stalls, you've outgrown pure novice programming. Shift Monday to a heavy/light scheme (heavy singles or triples followed by back-off sets). Consider moving to a 5/3/1 Wendler-style progression after this block. Re-assess body composition with photos and measurements."
targets = [
