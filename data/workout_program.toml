# ─────────────────────────────────────────────────────────────────────
# Nutrition
# ─────────────────────────────────────────────────────────────────────

[nutrition]
science_keys = ["recomp", "protein"]

[[nutrition.items]]
label = "Daily Protein Target"
value = "140–175g"
detail = "~0.8–1g per lb bodyweight. This is the single most important nutritional variable."

[[nutrition.items]]
label = "Caloric Strategy"
value = "Maintenance ± 200 cal"
detail = "Slight deficit on rest days, maintenance or slight surplus on heavy training days. Don't restrict aggressively — you're still building foundational muscle."

[[nutrition.items]]
label = "Tracking"
value = "Protein only (to start)"
detail = "You don't need to count every macro. Just ensure you hit protein. Use MyFitnessPal or MacroFactor for the first 2 weeks to calibrate your intuition, then adjust."

[[nutrition.items]]
label = "Timing"
value = "3–4 protein feedings/day"
detail = "~30–45g per meal distributes muscle protein synthesis signaling across the day. Don't skip breakfast if you're training in the afternoon."
